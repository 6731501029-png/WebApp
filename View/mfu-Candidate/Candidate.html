<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Candidate</title>
    <link rel="stylesheet" href="Candidate.css">
</head>

<body>

    <div class="container">
        <div class="card">

            <div class="logo">MFU</div>

            <h2>Candidate Login</h2>

            <div class="toggle">
                <button onclick="goVoter()">Voter</button>
                <button class="active">Candidate</button>
                <button onclick="goAdmin()">Admin</button>
            </div>

            <input id="id" placeholder="Candidate ID">
            <input id="pass" type="password" placeholder="Password">

            <button class="main-btn" onclick="login()">Login</button>

            <p style="margin-top:10px;">
                <a href="Candidate-register.html">Register</a>
            </p>

        </div>
    </div>

    <script src="Candidate.js"></script>
</body>

</html>
