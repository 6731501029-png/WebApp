<!DOCTYPE html>
<html lang="th">

    <link rel="stylesheet" href="Candidate-Policy.css">
    <title>Candidate Policy</title>
</head>

<body>

    <div class="navbar">
        <h2>🧑‍💼 Candidate Manager</h2>

    <div class="container">

        <!-- FORM -->
        <div class="card">
            <h3>เพิ่ม / แก้ไข ผู้สมัคร</h3>

            <button onclick="saveCandidate()">Save</button>

        <!-- LIST -->

    </div>

    <script src="Candidate-Policy.js"></script>

</html>
