<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Voter IDs - MFU Voting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* โทนสีจากรูปภาพ (MFU Theme) */
            --primary-deep-red: #6E1616;
            --primary-crimson: #8B1C1C;
            --primary-burnt-orange: #B56331;
            --accent-red-muted: #823B3B;
            --text-white: #FFFFFF;
            --text-dark: #4F4F4A;
            --bg-page: #FAF8F6;
            --bg-card: #FFFFFF;
            --border-light: #E0E0E0;
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Sarabun', system-ui, sans-serif;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        /* --- Navbar Section (มาตรฐานเดียวกับหน้าแรก) --- */
        .navbar {
            background: linear-gradient(90deg, var(--primary-deep-red) 0%, var(--primary-crimson) 40%, var(--primary-burnt-orange) 100%);
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-white);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar-brand-box {
            background-color: var(--accent-red-muted);
            padding: 5px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .navbar-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 20px;
        }

        .nav-link {
            color: var(--text-white);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 12px;
            transition: background-color 0.3s ease;
        }

        .nav-link.active {
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 5px;
        }

        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--text-white);
            color: var(--text-white);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background-color: var(--text-white);
            color: var(--primary-crimson);
        }

        /* --- Layout --- */
        .main-content {
            padding: 100px 5% 40px;
            /* เว้นที่ให้ Navbar */
        }

        .section-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        /* --- Buttons --- */
        .btn-red {
            background-color: var(--primary-crimson);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .btn-red:hover {
            background-color: var(--primary-deep-red);
            box-shadow: 0 2px 8px rgba(110, 22, 22, 0.3);
        }

        .btn-outline-red {
            border: 1px solid var(--primary-crimson);
            color: var(--primary-crimson);
            background-color: transparent;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-outline-red:hover {
            background-color: var(--primary-crimson);
            color: white;
        }

        /* --- Badges --- */
        .badge-active {
            background-color: #d1fae5;
            color: #065f46;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-disabled {
            background-color: #fee2e2;
            color: var(--primary-deep-red);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .voter-row {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .voter-row:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="navbar-left">
            <div class="navbar-brand-box">MFU</div>
            <div class="navbar-title">Voting</div>
            <a class="nav-link" href="/WebApp/View/Admin/Admin-Dashboard.html">Admin Dashboard</a>
            <a class="nav-link" href="/WebApp/View/Admin/Admin-Manage-Candidates.html">Manage Candidates</a>
            <a class="nav-link active" href="/WebApp/View/Admin/Admin-Manage-voter.html">Manage Voter</a>
        </div>
        <div class="navbar-right">
            <a class="logout-btn" href="/WebApp/View/Admin/Admin-login.html">Logout</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="section-container">

            <div class="card space-y-4">

                <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-200">
                    <h2 class="text-2xl font-bold" style="color: var(--primary-deep-red);">Manage Voter IDs</h2>
                    <button class="btn-red">+ Add ID</button>
                </div>

                <div class="flex flex-col">

                    <div class="voter-row">
                        <div class="w-1/3">
                            <p class="font-semibold text-gray-800">1-1234-56789-01-2</p>
                        </div>
                        <div class="w-1/3 text-gray-600">
                            <strong>Laser ID:</strong> MF4-5897842-38
                        </div>
                        <div class="w-1/3 flex justify-end items-center gap-4">
                            <span class="badge-active">Active</span>
                            <button class="btn-outline-red">Disable</button>
                        </div>
                    </div>

                    <div class="voter-row">
                        <div class="w-1/3">
                            <p class="font-semibold text-gray-800">1-9876-54321-09-8</p>
                        </div>
                        <div class="w-1/3 text-gray-600">
                            <strong>Laser ID:</strong> JT0-1234567-89
                        </div>
                        <div class="w-1/3 flex justify-end items-center gap-4">
                            <span class="badge-disabled">Disabled</span>
                            <button class="btn-outline-red">Enable</button>
                        </div>
                    </div>

                    <div class="voter-row">
                        <div class="w-1/3">
                            <p class="font-semibold text-gray-800">1-5555-12345-67-8</p>
                        </div>
                        <div class="w-1/3 text-gray-600">
                            <strong>Laser ID:</strong> KT8-5931890-73
                        </div>
                        <div class="w-1/3 flex justify-end items-center gap-4">
                            <span class="badge-active">Active</span>
                            <button class="btn-outline-red">Disable</button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</body>

</html>
