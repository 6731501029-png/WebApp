<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Public/css/app.css">
<link rel="stylesheet" href="/Public/css/bootstrap.min.css">
  <link rel="stylesheet" href="voters.css">
    <script src="/Public/js/app.js" defer></script>
<title>History • Voters • MFU Voting</title>
</head>
<body class="voters" data-page="history">
    <nav class="mfu-navbar">
    <div class="mfu-navbar__inner">
      <a class="mfu-navbar__brand" href="index.html"><span class="mfu-badge">MFU</span><span>Voting</span></a>
      <button class="mfu-navbar__toggle" type="button" aria-label="Toggle navigation" data-mfu-nav-toggle aria-expanded="false">≡</button>
      <div class="mfu-navbar__menu" data-mfu-nav-menu>
        <a class="mfu-navbar__link" href="dashboard.html">Dashboard</a>
        <a class="mfu-navbar__link" href="candidates.html">Candidates</a>
        <a class="mfu-navbar__link" href="results.html">Results</a>
        <a class="mfu-navbar__link" href="history.html">History</a>
      </div>
      <div class="mfu-navbar__right">
        <span class="mfu-pill">VOTERS</span>
        <span class="mfu-navbar__meta mfu-hide-sm">ผู้ใช้: <span data-auth-citizen></span></span>
        <button class="mfu-btn" type="button" data-action="logout" data-logout-href="login.html" data-clear="mfu_voters_auth,mfu_voters_vote,mfu_voters_votes_by_candidate">Logout</button>
      </div>
    </div>
  </nav>
<main class="voters-shell">
    <div class="container">
      <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end gap-2 mb-3">
        <div>
          <h2 class="mb-1">Voting History</h2>
          <div class="text-muted">ประวัติการโหวตของผู้ใช้งาน</div>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-soft" href="history.html">Refresh</a>
          <a class="btn btn-soft" href="candidates.html">ไปหน้า Candidates</a>
        </div>
      </div>

        <div class="glass p-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="text-muted small">ผู้ใช้: <span class="kbd" data-auth-citizen></span></div>
          </div>
          <div class="table-responsive">
            <table class="table voters-table align-middle mb-0">
            <thead>
              <tr>
                <th style="width:72px;">#</th>
                <th>Timestamp</th>
                <th style="width:120px;">Candidate</th>
                <th>Name</th>
                <th style="width:120px;">Status</th>
              </tr>
            </thead>
            <tbody data-history-body></tbody>
          </table>
          </div>
      </div>
    </div>
  </main>

  <footer class="py-4">
    <div class="container voters-footer d-flex flex-column flex-md-row justify-content-between gap-2">
      <div>MFU Election Voting (History)</div>
    </div>
  </footer>

  <script src="/Public/js/bootstrap.min.js"></script>
  <script src="voters.js"></script>
</body>
</html>
