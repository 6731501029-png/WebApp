<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/Public/css/app.css">
  <link rel="stylesheet" href="/Public/css/bootstrap.min.css">
  <link rel="stylesheet" href="voters.css">
  <script src="/Public/js/app.js" defer></script>
  <title>Logout • Voters • MFU Voting</title>
</head>
<body class="voters" data-page="logout">
    <nav class="mfu-navbar">
    <div class="mfu-navbar__inner">
      <a class="mfu-navbar__brand" href="index.html"><span class="mfu-badge">MFU</span><span>Voting</span></a>
      <button class="mfu-navbar__toggle" type="button" aria-label="Toggle navigation" data-mfu-nav-toggle aria-expanded="false">≡</button>
      <div class="mfu-navbar__menu" data-mfu-nav-menu>
        <a class="mfu-navbar__link" href="dashboard.html">Dashboard</a>
        <a class="mfu-navbar__link" href="candidates.html">Candidates</a>
        <a class="mfu-navbar__link" href="results.html">Results</a>
        <a class="mfu-navbar__link" href="history.html">History</a>
      </div>
      <div class="mfu-navbar__right">
        <span class="mfu-pill">VOTERS</span>
        <span class="mfu-navbar__meta mfu-hide-sm">ผู้ใช้: <span data-auth-citizen></span></span>
        <button class="mfu-btn" type="button" data-action="logout" data-logout-href="login.html" data-clear="mfu_voters_auth,mfu_voters_vote,mfu_voters_votes_by_candidate">Logout</button>
      </div>
    </div>
  </nav>
  <main class="container d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 64px); padding: 40px 0;">
    <div class="glass p-4" style="max-width: 560px; width: 100%;">
      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="badge voters-badge">LOGOUT</span>
        <span class="text-muted small">กำลังออกจากระบบ</span>
      </div>
      <h2 class="mb-2">กำลังออกจากระบบ...</h2>
      <div class="text-muted">ระบบจะพาคุณกลับไปหน้า Login อัตโนมัติ</div>
      <hr class="opacity-10">
      <div class="d-flex align-items-center gap-2 text-muted">
        <span class="animate-spin"></span>
        <span>Redirecting</span>
      </div>
      <div class="mt-3">
        <a class="btn btn-soft" href="login.html">กลับไปหน้า Login</a>
      </div>
    </div>
  </main>

  <script src="/Public/js/bootstrap.min.js"></script>
  <script src="voters.js"></script>
</body>
</html>
