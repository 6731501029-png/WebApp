<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Public/css/bootstrap.min.css">
    <link rel="stylesheet" href="voters.css">
    <title>Voters Login • MFU Voting</title>
</head>
<body class="voters" data-page="login">
    <main class="container d-flex align-items-center justify-content-center" style="min-height:100vh; padding: 40px 0;">
        <div class="row g-4 align-items-center" style="max-width: 980px; width: 100%;">
            <div class="col-12 col-lg-6">
                <div class="bg-login p-4 border-radius-1">
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <span class="mfu-mark">MFU</span>
                        <span class="small" style="color: rgba(255,255,255,.92);">Election Voting app</span>
                    </div>
                    <h1 class="mb-2">Voters Portal</h1>
                    <p class="mb-3" style="color: rgba(255,255,255,.86);">
                        เข้าสู่ระบบด้วย Citizen ID และ Laser ID เพื่อดูผู้สมัคร, ลงคะแนนได้ 1 ครั้ง, ดูผลและประวัติการโหวต
                    </p>
                    <div class="glass p-3">
                        <div class="text-muted small">คำแนะนำ</div>
                        <ul class="mb-0 text-muted small">
                            <li>Citizen ID: ตัวเลข 13 หลัก</li>
                            <li>Laser ID: ตัวอักษร/ตัวเลข 10–14 ตัว</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-6">
                <div class="glass p-4">
                    <h3 class="mb-1">Login</h3>
                    <div class="text-muted mb-3">กรุณากรอกข้อมูลบัตรประชาชน</div>

                    <div class="alert voters-alert d-none" role="alert" data-login-error></div>

                    <form data-login-form>
                        <div class="mb-3">
                            <label class="form-label">Citizen ID</label>
                            <input class="form-control" name="citizenId" inputmode="numeric" autocomplete="off" placeholder="13 หลัก" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Laser ID</label>
                            <input class="form-control" name="laserId" autocomplete="off" placeholder="10–14 ตัว" required>
                        </div>
                        <button class="btn btn-accent w-100" type="submit">เข้าสู่ระบบ</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="/Public/js/bootstrap.min.js"></script>
    <script src="voters.js"></script>
</body>
</html>
